<!DOCTYPE html>
<html><body>
<p>Right-click each image and "Save As" to create your PWA icons.</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, s, s);
  // Circle
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.38, 0, Math.PI*2);
  ctx.strokeStyle = '#00B5AD';
  ctx.lineWidth = s*0.03;
  ctx.stroke();
  // Star
  const cx = s/2, cy = s/2, r = s*0.2;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI / 5) - Math.PI/2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](cx + Math.cos(a)*r, cy + Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle = '#00918B';
  ctx.fill();
  // Text
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${s*0.08}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('SV', cx, cy + s*0.03);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body></html>
